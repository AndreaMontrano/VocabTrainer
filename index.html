<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabTrainer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">vocab<span>.</span>trainer</div>
  <div class="nav-tabs">
    <button class="active" onclick="showPage('home')">Home</button>
    <button onclick="showPage('lists')">Liste</button>
    <button onclick="showPage('profile')">Profilo</button>
  </div>
</header>

<!-- LOGIN -->
<div class="container" id="page-login" style="display:none">
  <div class="home-hero">
    <h1>vocab<span style="color:var(--accent)">.</span>trainer</h1>
    <p>Accedi o registrati per iniziare</p>
  </div>

  <div id="auth-tabs" style="display:flex;gap:8px;margin-bottom:20px">
    <button onclick="switchAuthTab('login')" id="tab-login" class="btn-start" style="margin:0">Accedi</button>
    <button onclick="switchAuthTab('register')" id="tab-register" class="btn-start" style="margin:0;background:var(--surface);border:1px solid var(--border);color:var(--muted)">Registrati</button>
  </div>

  <input id="auth-name" class="answer-input" type="text" placeholder="Il tuo nome"
    style="margin-bottom:10px;text-align:left;padding-left:16px;display:none">
  <input id="auth-email" class="answer-input" type="email" placeholder="Email"
    style="margin-bottom:10px;text-align:left;padding-left:16px">
  <input id="auth-password" class="answer-input" type="password" placeholder="Password"
    style="margin-bottom:10px;text-align:left;padding-left:16px">

  <div id="auth-error" style="color:var(--danger);font-size:13px;margin-bottom:10px;display:none"></div>
  <button class="btn-start" id="auth-submit" onclick="handleAuth()">Accedi</button>

  <div style="text-align:center;margin-top:20px">
    <div style="color:var(--muted);font-size:12px;margin-bottom:12px">oppure</div>
    <button onclick="loginWithGoogle()" class="btn-start" style="background:var(--surface);border:1px solid var(--border);color:var(--text)">
      🔵 Continua con Google
    </button>
  </div>
</div>

<!-- HOME -->
<!-- FIX #1: aggiunto id="home-greeting" all'h1 (era mancante → crash in renderHome) -->
<div class="container" id="page-home">
  <div class="home-hero">
    <h1 id="home-greeting">Level up your <span style="color:var(--accent)">English</span></h1>
    <p>Allenati ogni giorno con le parole che hai scelto tu</p>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <button class="btn-start" onclick="showPage('lists')">
    Inizia ad allenarti →
  </button>
</div>

<!-- LISTE -->
<div class="container" id="page-lists" style="display:none">
  <div class="home-hero">
    <h1>Scegli una <span style="color:var(--accent)">lista</span></h1>
    <p>Seleziona una lista per allenarti su un tema specifico</p>
  </div>
  <div id="lists-grid"></div>
</div>

<!-- QUIZ -->
<div class="container" id="page-quiz" style="display:none">
  <div id="quiz-area"></div>
</div>

<!-- PROFILO -->
<div class="container" id="page-profile" style="display:none">
  <div class="home-hero">
    <h1>Il tuo <span style="color:var(--accent)">profilo</span></h1>
    <p id="profile-email" style="color:var(--muted)"></p>
  </div>
  <div id="profile-content"></div>
  <button class="btn-start" onclick="logout()"
    style="background:var(--surface);border:1px solid var(--border);color:var(--danger);margin-top:24px">
    Logout
  </button>
</div>

<!-- FIX #6: rimosso page-db (era codice morto: nessuna tab di navigazione,
     nessun caso in showPage(), causava renderDB() inutili ad ogni loadWords) -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/words.js"></script>
<script src="js/quiz.js"></script>
<script src="js/profile.js"></script>
<script src="js/lists.js"></script>

</body>
</html>
